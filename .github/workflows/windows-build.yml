name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --bundles dmg,app
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build eql-speak (macOS)
        if: runner.os == 'macOS'
        run: bash ./scripts/build_eql_speak.sh

      - name: Pack Kokoro TTS for Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/pack_kokoro_windows.ps1

      # Always create a DRAFT first. Publishing happens only after we verify
      # Windows + Mac updater assets exist — never leave a broken "Latest".
      - name: Build installer (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: EQL Alerts ${{ steps.ver.outputs.tag }}
          releaseBody: |
            Installers for EQL Alerts.

            **Windows:** run the NSIS `.exe` (current-user install; no admin).
            **Mac (Apple Silicon):** open the `.dmg`, drag **EQL Alerts** to Applications.
            If Gatekeeper blocks the app: `xattr -dr com.apple.quarantine "/Applications/EQL Alerts.app"`

            Then: **Find log** / **Browse…** → **Overlay** → Ctrl/Cmd+Alt+L for click-through.

            Mac auto-detect looks for osxEQL Wine logs under
            `~/Library/Application Support/osxEQL/…/EverQuest Legends/Logs`,
            and Parallels mounts under `/Volumes`.

            Windows first launch extracts TTS models into `%LOCALAPPDATA%` (one-time).
            After this build, use **Check for updates** for future releases.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish only if updater assets are complete
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Checking assets on $TAG…"
          assets="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '[.assets[].name] | join("\n")')"
          echo "$assets"
          echo "$assets" | grep -E 'setup\.exe$' >/dev/null
          echo "$assets" | grep -E 'setup\.exe\.sig$' >/dev/null
          echo "$assets" | grep -E '\.dmg$' >/dev/null
          echo "$assets" | grep -x 'latest.json' >/dev/null
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
          echo "Published $TAG"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/latest.json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('updater feed version:', d.get('version'))"
